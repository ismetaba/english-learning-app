app = "english-learning-admin"
primary_region = "ams"

[build]

[env]
  DATABASE_PATH = "/data/admin.db"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data"
  destination = "/data"
