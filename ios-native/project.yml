name: EnglishLearning
options:
  bundleIdPrefix: com.ismetaba
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    GENERATE_INFOPLIST_FILE: "YES"

targets:
  EnglishLearning:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: EnglishLearning
        excludes:
          - "**/*.md"
    resources:
      - path: EnglishLearning/Resources
    info:
      path: EnglishLearning/Resources/Info.plist
      properties:
        CFBundleDisplayName: English Learning
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIRequiresFullScreen: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ismetaba.englishlearning.native
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "English Learning"
        INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleLightContent"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
