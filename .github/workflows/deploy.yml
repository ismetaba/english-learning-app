name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static web build
        run: npx expo export --platform web
        env:
          EXPO_BASE_URL: /english-learning-app

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          # Rewrite absolute asset paths in all HTML files to include the basePath
          find dist -name '*.html' -exec sed -i 's|src="/\(_expo/\)|src="/english-learning-app/\1|g' {} +
          find dist -name '*.html' -exec sed -i 's|href="/\(assets/\)|href="/english-learning-app/\1|g' {} +
          find dist -name '*.html' -exec sed -i 's|src="/\(assets/\)|src="/english-learning-app/\1|g' {} +
          # Fix runtime asset paths in the JS bundle (fonts, images loaded via fetch/XHR)
          find dist/_expo -name '*.js' -exec sed -i 's|"/assets/|"/english-learning-app/assets/|g' {} +

      - name: Copy standalone static pages (privacy policy)
        run: |
          # docs/* gets dropped into the deployed site verbatim so we can
          # serve a privacy policy URL App Store Connect can link to.
          if [ -d docs ]; then
            cp -R docs/. dist/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
